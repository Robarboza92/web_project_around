<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EUA Afora — uma página interativa onde os usuários podem adicionar, remover, ou curtir fotos. "
    />
    <meta name="author" content="Rodrigo Barboza" />
    <meta name="keywords" content="EUA Afora" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Around The US</title>
  </head>
  <body class="page">
    <header class="header">
      <img
        class="header__text"
        src="./images/Texto_Cabeçalho.png"
        alt="Texto_Cabeçalho"
      />
      <img
        class="header__line"
        src="./images/Line.png"
        alt="Divisa_cabeçalho"
      />
    </header>
    <main class="main">
      <div class="profile">
        <img
          class="profile__avatar"
          src="./images/Foto_Avatar.jpg"
          alt="Foto_avatar"
        />
        <div class="profile__info">
          <h1 class="profile__info-name">RODRIGO BARBOZA</h1>
          <button class="profile__info-editbutton" type="submit"></button>
          <h3 class="profile__info-job">Arquiteto e Urbanista</h3>
        </div>
        <button class="addbutton" type="submit"></button>
      </div>
      <div class="popup">
        <button type="submit" class="popup__close-button">X</button>
        <form class="popup__form" name="register">
          <h3 class="popup__title">Editar perfil</h3>
          <input
            class="popup__name-input"
            type="text"
            name="name"
            placeholder="Nome"
          />
          <input
            class="popup__job-input"
            type="text"
            name="job"
            placeholder="Sua descrição"
          />
          <button type="submit" class="popup__save-button">Salvar</button>
        </form>
      </div>
      <ul class="cards">
        <li class="card">
          <img
            class="card__image"
            src="./images/Museo_de_la_Memoria_y_los_Derechos_Humanos_MMDH.jpg"
            alt="Museo de la Memoria y los Derechos Humanos MMDH"
          />
          <div class="card__title">
            <h2 class="card__title-name">
              Museo de la Memoria y los Derechos Humanos MMDH
            </h2>
            <button class="card__like"></button>
          </div>
        </li>
        <li class="card">
          <img
            class="card__image"
            src="./images/Embalse_el_Yeso_Chile.jpg"
            alt="teste"
          />
          <div class="card__title">
            <h2 class="card__title-name">Embalse el Yeso - Chile</h2>
            <button class="card__like"></button>
          </div>
        </li>
        <li class="card">
          <img
            class="card__image"
            src="./images/Vina_del_mar_Chile.jpg"
            alt="teste"
          />
          <div class="card__title">
            <h2 class="card__title-name">Vina del mar - Chile</h2>
            <button class="card__like"></button>
          </div>
        </li>
        <li class="card">
          <img
            class="card__image"
            src="./images/Parque_de_Farellones_Chile.jpg"
            alt="teste"
          />
          <div class="card__title">
            <h2 class="card__title-name">Parque de Farellones - Chile</h2>
            <button class="card__like"></button>
          </div>
        </li>
        <li class="card">
          <img
            class="card__image"
            src="./images/Museu_Nacional_de_História_Natural_do_Chile.jpg"
            alt="teste"
          />
          <div class="card__title">
            <h2 class="card__title-name">
              Museu Nacional de História Natural do Chile
            </h2>
            <button class="card__like"></button>
          </div>
        </li>
        <li class="card">
          <img
            class="card__image"
            src="./images/Valle_Nevado_Hotel_Chile.jpg"
            alt="teste"
          />
          <div class="card__title">
            <h2 class="card__title-name">Valle Nevado Hotel</h2>
            <button class="card__like"></button>
          </div>
        </li>
      </ul>
    </main>
    <footer class="footer">
      <p class="footer__text">© 2024 Around The U.S.</p>
    </footer>
    <script src="./blocks/script.js"></script>
  </body>
</html>
